<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videos - Abhishek</title>

    <link rel="icon" type="image/jpeg" href="../assets/avatar.jpg" />

    <!-- Google Analytics (GA4) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-H7XW85DBKF"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-H7XW85DBKF");
    </script>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
      html.dark body {
        background-color: #0a0a0a;
      }
      html.dark .text-gray-900,
      html.dark .text-gray-800,
      html.dark .text-gray-700 {
        color: #ededed;
      }
      html.dark .text-gray-600,
      html.dark .text-gray-500 {
        color: #a1a1aa;
      }
      html.dark .border-gray-200,
      html.dark .border-gray-300 {
        border-color: #262626;
      }
      .theme-icon-moon {
        display: none;
      }
      html.dark .theme-icon-sun {
        display: none;
      }
      html.dark .theme-icon-moon {
        display: inline-flex;
      }
    </style>
  </head>

  <body
    class="bg-white text-gray-900 w-full max-w-3xl mx-auto px-5 sm:px-6 md:px-0 pb-16"
  >
    <!-- Nav -->
    <nav
      class="flex justify-between items-center gap-3 py-6 border-b border-gray-200"
    >
      <a href="../index.html" class="shrink-0">
        <img
          src="../assets/avatar.jpg"
          alt="Abhishek"
          class="w-10 h-10 sm:w-11 sm:h-11 rounded-lg object-cover"
        />
      </a>
      <div class="flex gap-4 sm:gap-6 text-sm items-center">
        <a href="../index.html" class="hover:text-orange-600 transition">Home</a>
        <a href="../blogs/blog.html" class="hover:text-orange-600 transition"
          >Blogs</a
        >
        <a
          href="../projects/projects.html"
          class="hover:text-orange-600 transition"
          >Projects</a
        >
        <a href="./videos.html" class="hover:text-orange-600 transition"
          >Videos</a
        >
        <button
          id="theme-toggle"
          aria-label="Switch white / black theme"
          title="Switch white / black theme"
          class="w-9 h-9 flex items-center justify-center rounded-full border border-gray-300 hover:text-orange-600 transition shrink-0"
        >
          <span class="theme-icon-sun"><i data-lucide="sun" class="w-4 h-4"></i></span>
          <span class="theme-icon-moon"><i data-lucide="moon" class="w-4 h-4"></i></span>
        </button>
      </div>
    </nav>

    <!-- Videos -->
    <section class="mt-10">
      <h2 class="text-xl sm:text-2xl font-semibold mb-6">Videos</h2>
      <p class="text-gray-700">
        I post on YouTube at
        <a
          href="https://youtube.com/@Abhishekinference"
          target="_blank"
          rel="noopener noreferrer"
          class="text-orange-600 hover:underline underline-offset-4"
          >@Abhishekinference</a
        >. More coming soon.
      </p>
    </section>

    <script>
      document.getElementById("theme-toggle").addEventListener("click", () => {
        document.documentElement.classList.toggle("dark");
      });
      lucide.createIcons();
    </script>
  </body>
</html>
